<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Dashboard</title>
    
    <!-- Google Fonts: Noto Sans KR -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #a2c2e1; /* 파스텔 블루 */
            --secondary-color: #fce4ec; /* 파스텔 핑크 */
            --text-color: #444;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 메인 컨테이너 카드 */
        .container {
            max-width: 500px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            overflow: hidden;
            transition: var(--transition);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 헤더 섹션 (프로필 이미지 및 이름) */
        .header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            padding: 40px 20px;
            text-align: center;
            color: white;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: white;
            margin: 0 auto 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            color: var(--primary-color);
            border: 5px solid rgba(255,255,255,0.3);
            transition: var(--transition);
        }

        .container:hover .profile-img {
            transform: scale(1.1) rotate(5deg);
        }

        .header h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
            letter-spacing: -1px;
        }

        .header p {
            font-weight: 300;
            opacity: 0.9;
        }

        /* 콘텐츠 섹션 */
        .content {
            padding: 30px;
        }

        .section {
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .section-title i {
            margin-right: 8px;
        }

        /* 정보 카드 스타일 */
        .info-card {
            background: #fdfdfd;
            border: 1px solid #eee;
            padding: 15px;
            border-radius: 15px;
            transition: var(--transition);
        }

        .info-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            border-color: var(--primary-color);
        }

        .motto {
            font-style: italic;
            color: #666;
            text-align: center;
            padding: 10px;
            border-left: 4px solid var(--secondary-color);
            background: #fff9fb;
        }

        /* 태그 스타일 (관심사) */
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            background: var(--bg-color);
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            transition: var(--transition);
        }

        .tag:hover {
            background: var(--primary-color);
            color: white;
        }

        /* 연락처 버튼 */
        .contact-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }

        .contact-item {
            text-decoration: none;
            color: #888;
            font-size: 1.5rem;
            transition: var(--transition);
        }

        .contact-item:hover {
            color: var(--primary-color);
            transform: scale(1.2);
        }

        /* 푸터 */
        .footer {
            text-align: center;
            padding: 20px;
            font-size: 0.75rem;
            color: #bbb;
            background: #fafafa;
        }

        /* 반응형 조절 */
        @media (max-width: 480px) {
            .container {
                border-radius: 0;
            }
            body {
                padding: 0;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 헤더 섹션 -->
        <header class="header">
            <div class="profile-img">
                <i class="fa-solid fa-user"></i>
            </div>
            <h1> Personal Dashboard </h1>
            <p> Son Chaeeun </p>
        </header>

        <!-- 메인 콘텐츠 -->
        <main class="content">
            
            <!-- Vision -->
            <div class="section">
                <div class="section-title"><i class="fa-solid fa-quote-left"></i> Vision </div>
                <div class="info-card motto">
                    "사랑을 전하는 사람"
                </div>
            </div>

            <!-- 관심사/취미 -->
            <div class="section">
                <div class="section-title"><i class="fa-solid fa-heart"></i> Interests</div>
                <div class="tags">
                    <span class="tag">#playing piano</span>
                    <span class="tag">#bible</span>
                    <span class="tag">#sleeping</span>
                    <span class="tag">#business administration</span>
                </div>
            </div>

            <!-- 연락처 -->
            <div class="section">
                <div class="section-title"><i class="fa-solid fa-envelope"></i> Contact</div>
                <div class="contact-links">
                    <a href="mailto:your-email@example.com" class="contact-item" title="Email">
                        <i class="fa-solid fa-envelope"></i>
                    </a>
                    <a href="https://instagram.com/your_id" target="_blank" class="contact-item" title="Instagram">
                        <i class="fa-brands fa-instagram"></i>
                    </a>
                    <a href="#" class="contact-item" title="Blog" onclick="alert('준비 중입니다!')">
                        <i class="fa-solid fa-blog"></i>
                    </a>
                </div>
            </div>

        </main>

        <!-- 푸터 -->
        <footer class="footer">
            &copy; 2023 sonchaeeun.
        </footer>
    </div>

    <script>
        // 간단한 인터랙션: 카드 클릭 시 콘솔에 인사말 출력
        document.querySelector('.container').addEventListener('click', function() {
            console.log("방문해주셔서 감사합니다!");
        });

        // 스크롤 시 부드럽게 나타나는 효과 (추가 확장 가능)
        window.addEventListener('load', () => {
            const container = document.querySelector('.container');
            container.style.opacity = '1';
        });
    </script>
</body>
</html>
